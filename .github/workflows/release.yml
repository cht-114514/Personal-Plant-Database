name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync VERSION file with tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "$TAG" > VERSION
          echo "Building release: $TAG"

      - name: Build release zip
        run: python3 tools/build_release.py

      - name: Locate built artifact
        id: artifact
        run: |
          ZIP=$(ls dist/botanical-*.zip | head -n1)
          echo "zip_path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: INSTALL.md
          files: |
            ${{ steps.artifact.outputs.zip_path }}
            INSTALL.md
          draft: false
          prerelease: false
